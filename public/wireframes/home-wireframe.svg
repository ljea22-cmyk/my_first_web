  <rect x="600" y="330" width="540" height="120" class="card"/>

  <!-- Card 3 -->
  <rect x="40" y="470" width="540" height="120" class="card"/>
  <rect x="600" y="470" width="540" height="120" class="card"/>

  <!-- Card content placeholders -->
  <!-- Titles -->
  <text x="64" y="220" class="title" font-size="16">게시물 제목 예시 — 카드 1</text>
  <text x="624" y="220" class="title" font-size="16">게시물 제목 예시 — 카드 2</text>

