  <text x="624" y="500" class="title" font-size="16">게시물 제목 예시 — 카드 6</text>

  <!-- Excerpt lines -->
  <line x1="64" y1="235" x2="560" y2="235" class="line" />
  <line x1="624" y1="235" x2="1120" y2="235" class="line" />

  <text x="64" y="255" class="muted" font-size="13">간단한 요약 텍스트가 들어갑니다. 내용 일부를 보여줍니다.</text>
  <text x="624" y="255" class="muted" font-size="13">간단한 요약 텍스트가 들어갑니다. 내용 일부를 보여줍니다.</text>

