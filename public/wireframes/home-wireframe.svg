<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" style="background:#fff">
  <style>
    .muted { fill:#8b8b8b; font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; }
    .title { fill:#111827; font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto; font-weight:700 }
    .card { fill:#ffffff; stroke:#e5e7eb; stroke-width:1; rx:10 }
    .line { stroke:#e5e7eb; stroke-width:1 }
  </style>

  <!-- Header -->
  <rect x="40" y="28" width="1120" height="64" rx="8" fill="#ffffff" stroke="#f3f4f6"/>
  <text x="64" y="68" class="title" font-size="20">My First Web</text>
  <text x="1080" y="68" class="muted" font-size="14" text-anchor="end">로그인</text>

  <!-- Search bar -->
  <rect x="40" y="110" width="820" height="56" rx="8" fill="#f8fafc" stroke="#e6edf3"/>
  <text x="64" y="145" class="muted" font-size="14">🔍 검색어를 입력하세요 (제목 중심)</text>
  <rect x="880" y="110" width="280" height="56" rx="8" fill="#4f46e5"/>
  <text x="1020" y="145" fill="#ffffff" font-size="14" text-anchor="middle">새 글 작성</text>

  <!-- Grid of post cards (2 columns x 3 rows) -->
  <!-- Card 1 -->
  <rect x="40" y="190" width="540" height="120" class="card"/>
